name: Compatibility report
description: Report whether these skills work in a specific agent or install path.
title: "Compatibility: "
labels: [compatibility]
body:
  - type: input
    id: agent
    attributes:
      label: Agent or environment
      placeholder: Claude Code, Codex, Cursor, Qwen, OpenClaw
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15, Windows 11, Ubuntu 24.04
    validations:
      required: true
  - type: textarea
    id: install
    attributes:
      label: Install method
      placeholder: npx skills add ..., copied skills/project-docs-cleanup to ...
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Result
      description: What worked, failed, or needed adaptation?
    validations:
      required: true
