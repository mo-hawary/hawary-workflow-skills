name: Docs improvement
description: Suggest an improvement to README, install docs, examples, or references.
title: "Docs: "
labels: [documentation]
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      placeholder: README.md
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What should change?
      description: Explain the confusing, missing, stale, or inaccurate part.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested wording or structure
      description: Optional concrete replacement text.
    validations:
      required: false
